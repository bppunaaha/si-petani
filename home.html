<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>SI-PETANI</title>
  <link rel="icon" href="https://files.catbox.moe/bpvotk.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,700;12..96,800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <!--
    ====== GANTI 3 TAUTAN INI BILA URL REPO BERBEDA ======
    Viewer (publik) : https://bppunaaha.github.io/si-petani/
    Editor (penyuluh): https://bppunaaha.github.io/si-petani/Editor.html   (huruf E besar)
    Mode Data (PWA) : https://bppunaaha.github.io/si-petani/app.html
    Cari atribut href="..." di tiga tombol <a> di bawah lalu sesuaikan.
    =======================================================
  -->
  <style>
    :root{ --green-900:#10331C; --green-800:#163F22; --green-700:#1F5C2E; --green-600:#2C7A40; --green-500:#3C9A55; --gold-soft:#F6C453; --cream:#FBF8F1; --paper:#fff; --ink:#16271C; --muted:#6E7F72; --line:#E7E3D8; }
    *{ box-sizing:border-box; }
    html,body{ height:100%; margin:0; }
    body{ font-family:'Plus Jakarta Sans',sans-serif; color:var(--ink); background:linear-gradient(135deg,var(--green-800),var(--green-600)); display:flex; align-items:center; justify-content:center; padding:20px; min-height:100vh; }
    .card{ background:var(--cream); border-radius:22px; padding:26px 22px 20px; width:100%; max-width:400px; box-shadow:0 22px 60px rgba(0,0,0,.32); animation:rise .5s cubic-bezier(.2,.8,.2,1) both; }
    @keyframes rise{ from{opacity:0; transform:translateY(16px);} to{opacity:1; transform:none;} }
    .brand{ text-align:center; margin-bottom:18px; }
    .emblem{ width:64px; height:64px; margin:0 auto 12px; background:#fff; border-radius:18px; display:flex; align-items:center; justify-content:center; box-shadow:0 6px 16px rgba(0,0,0,.18); }
    .emblem svg{ width:42px; height:42px; }
    .kicker{ font-size:9.5px; letter-spacing:.16em; text-transform:uppercase; color:var(--green-600); font-weight:800; }
    h1{ font-family:'Bricolage Grotesque',sans-serif; font-weight:800; font-size:30px; margin:4px 0 2px; letter-spacing:-.01em; }
    .loc{ font-size:12px; color:var(--muted); margin:0; }
    .opts{ display:flex; flex-direction:column; gap:11px; margin-top:4px; }
    .opt{ display:flex; align-items:center; gap:13px; padding:15px 16px; border-radius:15px; text-decoration:none; color:var(--ink); border:1px solid var(--line); background:var(--paper); transition:.16s; }
    .opt:hover{ transform:translateY(-2px); box-shadow:0 8px 20px rgba(16,51,28,.14); border-color:#D5E5D8; }
    .opt.primary{ background:linear-gradient(135deg,var(--green-700),var(--green-600)); color:#fff; border-color:transparent; }
    .opt .ic{ width:46px; height:46px; border-radius:12px; flex:none; display:flex; align-items:center; justify-content:center; font-size:23px; background:#E8F1EA; }
    .opt.primary .ic{ background:rgba(255,255,255,.18); }
    .opt .tx{ flex:1; min-width:0; }
    .opt .tt{ font-weight:800; font-size:15px; }
    .opt .ds{ font-size:11.5px; opacity:.82; margin-top:1px; }
    .opt .ar{ font-size:20px; opacity:.55; }
    .foot{ text-align:center; font-size:11px; color:#9a9a8e; margin-top:16px; line-height:1.5; }
  </style>
</head>
<body>
  <div class="card">
    <div class="brand">
      <div class="emblem">
        <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" aria-label="SI-PETANI">
          <polygon points="50,84 30,54 70,54" fill="#1F5C2E"/>
          <circle cx="50" cy="42" r="23" fill="#1F5C2E"/>
          <path d="M50,57 Q50,46 50,33" stroke="#fff" stroke-width="3.4" fill="none" stroke-linecap="round"/>
          <ellipse cx="40" cy="41" rx="8.5" ry="4.2" fill="#fff" transform="rotate(-38 40 41)"/>
          <ellipse cx="60" cy="38" rx="8.5" ry="4.2" fill="#fff" transform="rotate(38 60 38)"/>
        </svg>
      </div>
      <div class="kicker">Sistem Informasi Peta Potensi Pertanian</div>
      <h1>SI-PETANI</h1>
      <p class="loc">BPP Unaaha, Kabupaten Konawe</p>
    </div>
    <div class="opts">
      <a class="opt primary" href="https://bppunaaha.github.io/si-petani/"><span class="ic">🗺️</span><span class="tx"><span class="tt">Lihat Peta</span><span class="ds">Peta potensi pertanian (publik)</span></span><span class="ar">›</span></a>
      <a class="opt" href="https://bppunaaha.github.io/si-petani/Editor.html"><span class="ic">🧑‍🌾</span><span class="tx"><span class="tt">Masuk sebagai Penyuluh</span><span class="ds">Editor peta &amp; data — perlu login</span></span><span class="ar">›</span></a>
      <a class="opt" href="https://bppunaaha.github.io/si-petani/app.html"><span class="ic">📲</span><span class="tx"><span class="tt">Mode Input Data</span><span class="ds">Aplikasi input cepat penyuluh</span></span><span class="ar">›</span></a>
    </div>
    <div class="foot">BPP Unaaha 2026 · By Hasan Silondae</div>
  </div>
</body>
</html>
