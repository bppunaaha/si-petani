<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#1F5C2E">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="SI-PETANI">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<title>SI-PETANI Penyuluh</title>
<style>
  *{ box-sizing:border-box; margin:0; padding:0; }
  html,body{ height:100%; overflow:hidden; background:#0B2614; font-family:'Plus Jakarta Sans',system-ui,'Segoe UI',sans-serif; }
  #frame{ position:fixed; inset:0; width:100%; height:100%; border:0; }

  /* ===== SPLASH ===== */
  #splash{
    position:fixed; inset:0; z-index:10;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    overflow:hidden;
    transition:opacity .6s ease;
  }
  #splash.hide{ opacity:0; pointer-events:none; }

  .splash-bg{
    position:absolute; inset:0;
    background:linear-gradient(155deg, #0B2614 0%, #163F22 45%, #1F5C2E 80%, #2C7A40 100%);
  }
  .splash-grid{
    position:absolute; inset:0;
    background:
      linear-gradient(rgba(255,255,255,.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,.025) 1px, transparent 1px);
    background-size:40px 40px;
  }
  .splash-glow{
    position:absolute; inset:0;
    background:radial-gradient(ellipse 60% 50% at 50% 45%, rgba(60,154,85,.22) 0%, transparent 70%);
  }

  .splash-content{
    position:relative; z-index:1;
    display:flex; flex-direction:column; align-items:center;
    gap:14px;
    animation:splashIn .8s cubic-bezier(.2,.8,.2,1) both;
  }
  @keyframes splashIn{
    from{ opacity:0; transform:translateY(20px); }
    to{ opacity:1; transform:none; }
  }

  .splash-logo{
    width:80px; height:80px;
    border-radius:20px;
    background:#fff;
    display:flex; align-items:center; justify-content:center;
    box-shadow:0 8px 32px rgba(0,0,0,.35), 0 0 0 3px rgba(246,196,83,.3);
    animation:logoPop .9s cubic-bezier(.2,.8,.2,1) .1s both;
  }
  @keyframes logoPop{
    from{ transform:scale(.6) rotate(-10deg); opacity:0; }
    to{ transform:none; opacity:1; }
  }
  .splash-logo svg{ width:50px; height:50px; }

  .splash-badge{
    display:inline-flex; align-items:center; gap:6px;
    background:rgba(246,196,83,.15);
    border:1px solid rgba(246,196,83,.35);
    border-radius:20px;
    padding:5px 14px;
    font-size:10.5px; font-weight:800;
    letter-spacing:.16em; text-transform:uppercase;
    color:#F6C453;
  }
  .splash-badge .bdot{
    width:6px; height:6px; border-radius:50%;
    background:#F6C453;
    animation:bdotBlink 1.4s ease-in-out infinite;
  }
  @keyframes bdotBlink{ 0%,100%{opacity:1;} 50%{opacity:.2;} }

  .splash-title{
    font-size:30px; font-weight:800;
    color:#fff; letter-spacing:-.02em;
    text-shadow:0 2px 16px rgba(0,0,0,.3);
    line-height:1;
    text-align:center;
  }
  .splash-title span{
    display:block; font-size:15px; font-weight:600;
    color:rgba(255,255,255,.65);
    letter-spacing:.02em; margin-top:4px;
  }

  .splash-progress{
    width:160px; height:3px;
    background:rgba(255,255,255,.12);
    border-radius:3px; overflow:hidden;
    margin-top:4px;
  }
  .splash-progress-bar{
    height:100%;
    background:linear-gradient(90deg, #3C9A55, #F6C453);
    border-radius:3px;
    animation:progress 8s ease-out forwards;
  }
  @keyframes progress{
    0%{width:0%;} 30%{width:45%;} 70%{width:75%;} 95%{width:92%;} 100%{width:100%;}
  }

  .splash-hint{
    font-size:11px; color:rgba(255,255,255,.4);
    animation:fadeHint 1s ease .5s both;
  }
  @keyframes fadeHint{ from{opacity:0;} to{opacity:1;} }

  /* Ikon fitur kecil */
  .splash-features{
    display:flex; gap:20px; margin-top:4px;
  }
  .splash-feat{
    display:flex; flex-direction:column; align-items:center; gap:5px;
    font-size:10px; color:rgba(255,255,255,.5); font-weight:600;
    letter-spacing:.04em;
  }
  .splash-feat .fic{
    width:36px; height:36px; border-radius:10px;
    background:rgba(255,255,255,.08);
    border:1px solid rgba(255,255,255,.1);
    display:flex; align-items:center; justify-content:center;
    font-size:17px;
  }

  .spark{
    position:absolute; border-radius:50%;
    background:rgba(246,196,83,.12);
    animation:sparkFloat linear infinite;
    pointer-events:none;
  }
  @keyframes sparkFloat{
    0%{transform:translateY(0) scale(1);opacity:0;}
    10%{opacity:1;} 90%{opacity:.5;}
    100%{transform:translateY(-100vh) scale(1.5);opacity:0;}
  }
</style>
</head>
<body>

<div id="splash">
  <div class="splash-bg"></div>
  <div class="splash-grid"></div>
  <div class="splash-glow"></div>
  <div id="sparks"></div>

  <div class="splash-content">
    <div class="splash-badge"><span class="bdot"></span> Mode Input Data</div>
    <div class="splash-logo">
      <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
        <polygon points="50,84 30,54 70,54" fill="#1F5C2E"/>
        <circle cx="50" cy="42" r="23" fill="#1F5C2E"/>
        <path d="M50,57 Q50,46 50,33" stroke="#fff" stroke-width="3.4" fill="none" stroke-linecap="round"/>
        <ellipse cx="40" cy="41" rx="8.5" ry="4.2" fill="#fff" transform="rotate(-38 40 41)"/>
        <ellipse cx="60" cy="38" rx="8.5" ry="4.2" fill="#fff" transform="rotate(38 60 38)"/>
      </svg>
    </div>
    <div class="splash-title">
      SI-PETANI
      <span>Aplikasi Penyuluh · BPP Unaaha</span>
    </div>
    <div class="splash-features">
      <div class="splash-feat"><div class="fic">🧑‍🌾</div>Petani</div>
      <div class="splash-feat"><div class="fic">🌱</div>LTT</div>
      <div class="splash-feat"><div class="fic">📋</div>Kunjungan</div>
      <div class="splash-feat"><div class="fic">📊</div>Rekap</div>
    </div>
    <div class="splash-progress"><div class="splash-progress-bar"></div></div>
    <div class="splash-hint">Memuat aplikasi…</div>
  </div>
</div>

<iframe id="frame" allow="geolocation *; camera *; fullscreen" referrerpolicy="no-referrer-when-downgrade"></iframe>

<script>
  /* Partikel */
  (function(){
    var c=document.getElementById('sparks');
    for(var i=0;i<16;i++){
      var s=document.createElement('div'); s.className='spark';
      var sz=3+Math.random()*8;
      s.style.cssText='width:'+sz+'px;height:'+sz+'px;left:'+(Math.random()*100)+'%;bottom:'+(Math.random()*40)+'%;animation-duration:'+(10+Math.random()*14)+'s;animation-delay:'+(Math.random()*10)+'s';
      c.appendChild(s);
    }
  })();

  /* URL Apps Script — JANGAN DIUBAH — bug duplikat mode=data sudah diperbaiki */
  var APP_URL = "https://script.google.com/macros/s/AKfycbzhuBxUy4QQiwuRk8lWq8KAgG0h2aa66yQ395k12-63f2TaIKVKX-qQy6wTrz76NZDxrw/exec";

  var f = document.getElementById('frame');
  f.src = APP_URL + (APP_URL.indexOf('?') < 0 ? '?' : '&') + 'mode=data';

  function hideSplash(){
    document.getElementById('splash').classList.add('hide');
  }
  f.addEventListener('load', function(){ setTimeout(hideSplash, 400); });
  setTimeout(hideSplash, 9000);

  if('serviceWorker' in navigator){
    window.addEventListener('load', function(){
      navigator.serviceWorker.register('sw.js').catch(function(){});
    });
  }
</script>
</body>
</html>
